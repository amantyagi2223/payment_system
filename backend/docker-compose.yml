services:
  postgres:
    image: postgres:16-alpine
    container_name: stealth_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: apple
      POSTGRES_DB: crypto_gateway
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U apple -d crypto_gateway']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
